name: Benchmarks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pytest

    - name: Install package
      run: |
        pip install .

    - name: Verify installation
      run: |
        python -c "import aleam; print('Aleam imported successfully')"

    - name: Run CPU benchmarks only
      run: |
        python -c "
import time
import random
import aleam as al

print('=' * 60)
print('ALEAM - CPU BENCHMARK (GitHub Actions)')
print('=' * 60)

# Python random
start = time.time()
for _ in range(10_000_000):
    random.random()
py_speed = 10_000_000 / (time.time() - start) / 1_000_000

# Aleam CPU
rng = al.Aleam()
start = time.time()
for _ in range(1_000_000):
    rng.random()
cpu_speed = 1_000_000 / (time.time() - start) / 1_000_000

print(f'\n  Python random: {py_speed:.2f}M ops/sec')
print(f'  Aleam CPU:     {cpu_speed:.2f}M ops/sec')
print('\n✅ CPU benchmarks complete (GPU not available in CI)')
"