name: Benchmarks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy

    - name: Install package
      run: |
        pip install .

    - name: Verify installation
      run: |
        python -c "import aleam; print('Aleam imported successfully')"

    - name: Run CPU benchmarks
      run: |
        python -c "
import time
import random
import aleam as al

print('=' * 60)
print('ALEAM - CPU BENCHMARK')
print('=' * 60)

# Python random
count = 10_000_000
start = time.time()
for _ in range(count):
    random.random()
py_speed = count / (time.time() - start) / 1_000_000
print(f'Python random: {py_speed:.2f}M ops/sec')

# Aleam CPU
rng = al.Aleam()
count = 1_000_000
start = time.time()
for _ in range(count):
    rng.random()
cpu_speed = count / (time.time() - start) / 1_000_000
print(f'Aleam CPU:     {cpu_speed:.2f}M ops/sec')
"