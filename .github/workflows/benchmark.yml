name: Benchmarks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install numpy

    - name: Run benchmarks
      run: |
        python -c "
import time
import aleam as al
rng = al.Aleam()
iterations = 100000
start = time.time()
for _ in range(iterations):
    rng.random()
elapsed = time.time() - start
print(f'Random: {iterations/elapsed:,.0f} ops/sec')
start = time.time()
for _ in range(iterations):
    rng.gauss(0, 1)
elapsed = time.time() - start
print(f'Gauss: {iterations/elapsed:,.0f} ops/sec')
"
