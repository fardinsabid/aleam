name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov pytest-xdist numpy

    - name: Run tests
      run: |
        pytest tests/ -v --cov=aleam --cov-report=xml --cov-report=term-missing -n auto

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  test-minimal:
    name: Test minimal dependencies
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install only core dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest numpy

    - name: Run core tests
      run: |
        pytest tests/test_core.py tests/test_statistical.py -v

  test-statistical:
    name: Statistical tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest numpy scipy

    - name: Run statistical tests
      run: |
        pytest tests/test_statistical.py -v --durations=10

  test-distributions:
    name: Distribution tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest numpy scipy

    - name: Run distribution tests
      run: |
        pytest tests/test_core.py::TestAleamDistributions -v

  test-frameworks:
    name: Framework integration tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [torch, tensorflow, jax]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest numpy

    - name: Install ${{ matrix.framework }}
      run: |
        if [ "${{ matrix.framework }}" = "torch" ]; then
          pip install torch --index-url https://download.pytorch.org/whl/cpu
        elif [ "${{ matrix.framework }}" = "tensorflow" ]; then
          pip install tensorflow-cpu
        elif [ "${{ matrix.framework }}" = "jax" ]; then
          pip install jax jaxlib
        fi

    - name: Run ${{ matrix.framework }} tests
      run: |
        pytest tests/test_${{ matrix.framework }}_integration.py -v 2>/dev/null || echo "No tests for ${{ matrix.framework }}"

  lint:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 mypy

    - name: Run black
      run: |
        black --check aleam/ tests/ --diff

    - name: Run flake8
      run: |
        flake8 aleam/ tests/ --max-line-length=88 --extend-ignore=E203,W503

    - name: Run mypy
      run: |
        mypy aleam/ --ignore-missing-imports || true