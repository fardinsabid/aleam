name: Build and Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.3)'
        required: true
        default: 'v1.0.3'
        type: string

jobs:
  build-x86_64:
    name: Build x86_64 wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
      
      - name: Install Python dependencies
        run: |
          pip install pybind11 build wheel setuptools
      
      - name: Build wheel
        run: python -m build --wheel
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-wheel
          path: dist/*.whl

  build-arm64:
    name: Build ARM64 wheel
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
      
      - name: Install Python dependencies
        run: |
          pip install pybind11 build wheel setuptools
      
      - name: Build wheel
        run: python -m build --wheel
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arm64-wheel
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-x86_64, build-arm64]
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: dist
      
      - name: List all wheels
        run: ls -la dist/
      
      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true